spring.application.name=ecommerce

# ---------------------------------------------------------------------------
# Database (override with DB_URL, DB_USERNAME, DB_PASSWORD in GCP / env)
# ---------------------------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ecommerce}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}

# ---------------------------------------------------------------------------
# JPA / Hibernate (prod overrides in application-prod.properties)
# ---------------------------------------------------------------------------
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ---------------------------------------------------------------------------
# GraphQL (disabled in prod via application-prod.properties)
# ---------------------------------------------------------------------------
spring.graphql.graphiql.enabled=true

# ---------------------------------------------------------------------------
# App auth (override with APP_JWT_SECRET, etc. in GCP; local defaults in application-local)
# ---------------------------------------------------------------------------
app.jwt-secret=${APP_JWT_SECRET:}
app.jwt-expiration-minutes=${APP_JWT_EXPIRATION_MINUTES:900000}
app.refresh-token-expiration-days=${APP_REFRESH_TOKEN_EXPIRATION_DAYS:604800000}

# ---------------------------------------------------------------------------
# Stripe (override with STRIPE_API_KEY, STRIPE_WEBHOOK_SECRET in GCP)
# ---------------------------------------------------------------------------
stripe.api-key=${STRIPE_API_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
stripe.currency=${STRIPE_CURRENCY:usd}

# ---------------------------------------------------------------------------
# Rate limiting
# ---------------------------------------------------------------------------
rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
rate-limit.password-reset.capacity=3
rate-limit.password-reset.refill-duration-minutes=15
rate-limit.cache-max-size=10000
rate-limit.cache-ttl-minutes=60

# ---------------------------------------------------------------------------
# Mail (override with SPRING_MAIL_* or mail.* in application-local / GCP)
# ---------------------------------------------------------------------------
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.trust=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.properties.mail.smtp.starttls.enable=true

# ---------------------------------------------------------------------------
# Cloudinary (override with CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET in GCP)
# ---------------------------------------------------------------------------
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
