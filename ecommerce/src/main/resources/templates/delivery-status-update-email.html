<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Delivery Status Update</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">
<table role="presentation" style="max-width: 600px; margin: auto; background-color: #ffffff; padding: 30px; border-radius: 8px;">
  <tr>
    <td style="text-align: center;">
      <h1 style="color: #333333;">Delivery Status Update</h1>
      <p style="color: #666666; font-size: 16px;">Hello {{name}},</p>
      <p style="color: #666666; font-size: 16px;">Your order <strong>#{{order_id}}</strong> delivery status has been updated.</p>
      <p style="color: #666666; font-size: 16px;">
        <strong>Previous status:</strong> {{previous_status}}<br>
        <strong>New status:</strong> {{new_status}}
      </p>
      <p style="color: #666666; font-size: 16px;">Tracking number: <strong>{{tracking_number}}</strong></p>
      <p style="color: #999999; font-size: 14px;">Thank you for shopping with us.</p>
    </td>
  </tr>
</table>
</body>
</html>
