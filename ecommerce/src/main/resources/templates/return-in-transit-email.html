<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Return Shipment Received</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">
<table role="presentation" style="max-width: 600px; margin: auto; background-color: #ffffff; padding: 30px; border-radius: 8px;">
  <tr>
    <td style="text-align: center;">
      <h1 style="color: #333333;">Return Shipment Submitted</h1>
      <p style="color: #666666; font-size: 16px;">Hello {{name}},</p>
      <p style="color: #666666; font-size: 16px;">We have registered your return shipment for order <strong>#{{order_id}}</strong>.</p>
      <p style="color: #666666; font-size: 16px;">
        <strong>Carrier:</strong> {{carrier_name}}<br>
        <strong>Tracking Number:</strong> {{tracking_number}}
      </p>
      <p style="color: #666666; font-size: 16px;">Once we receive your package, your refund will be processed promptly.</p>
      <p style="color: #999999; font-size: 14px;">Thank you for your cooperation.</p>
    </td>
  </tr>
</table>
</body>
</html>
