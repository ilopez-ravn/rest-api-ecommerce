<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Refund Processed</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">
<table role="presentation" style="max-width: 600px; margin: auto; background-color: #ffffff; padding: 30px; border-radius: 8px;">
  <tr>
    <td style="text-align: center;">
      <h1 style="color: #333333;">Your Refund Has Been Processed</h1>
      <p style="color: #666666; font-size: 16px;">Hello {{name}},</p>
      <p style="color: #666666; font-size: 16px;">Your refund for order <strong>#{{order_id}}</strong> has been successfully processed.</p>
      <p style="color: #666666; font-size: 16px;">Refund amount: <strong>${{refund_amount}}</strong></p>
      <p style="color: #666666; font-size: 16px;">Please allow 5-10 business days for the funds to appear in your account.</p>
      <p style="color: #999999; font-size: 14px;">Thank you for shopping with us.</p>
    </td>
  </tr>
</table>
</body>
</html>
