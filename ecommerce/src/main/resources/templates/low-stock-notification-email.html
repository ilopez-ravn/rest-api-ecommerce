<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Low Stock Alert</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">
<table role="presentation" style="max-width: 600px; margin: auto; background-color: #ffffff; padding: 30px; border-radius: 8px;">
  <tr>
    <td style="text-align: center;">
<img align="center" border="0" src="https://ci3.googleusercontent.com/meips/ADKq_Nal_JdXqdUOzh6D3qrNwgRwgweDnAHYxLK_703w1E7YzARpNAsj0RVXfOeHIwo-rapsTrUGJcasyU_9Ntq159sqTLJao6ndOWIDVLvpgZV38xgGvVMxBf44ZwMNtZaBxB-ANi17KFBg1f4ufsIQ6Q=s0-d-e1-ft#https://storage.googleapis.com/mission-board-stg/email-templates/white-header-desktop.png" alt="Image" title="Image" style="outline: none;text-decoration: none;-ms-interpolation-mode: bicubic;clear: both;display: inline-block !important;border: none;height: auto;float: none" width="100%" height="auto" />
      <h1 style="color: #333333;">Low Stock Alert</h1>
      <p style="color: #666666; font-size: 16px;">Hello {{name}},</p>
      <p style="color: #666666; font-size: 16px;">A product you liked is running low in stock.</p>
      <p style="color: #666666; font-size: 16px;"><strong>{{product_name}}</strong> now has only <strong>{{remaining_stock}}</strong> unit(s) left.</p>
      <p style="color: #666666; font-size: 16px;">If you were planning to purchase it, we recommend doing so soon.</p>

      <a href="{{product_link}}" style="display: inline-block; padding: 15px 25px; background-color: #007bff; color: #ffffff; text-decoration: none; border-radius: 5px; font-weight: bold; margin: 20px 0;">View product</a>

      <p style="color: #999999; font-size: 14px;">Thank you for your interest in our products.</p>
    </td>
  </tr>
</table>
</body>
</html>
