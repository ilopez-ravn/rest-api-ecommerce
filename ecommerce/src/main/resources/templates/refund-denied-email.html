<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Refund Request Denied</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">
<table role="presentation" style="max-width: 600px; margin: auto; background-color: #ffffff; padding: 30px; border-radius: 8px;">
  <tr>
    <td style="text-align: center;">
      <h1 style="color: #333333;">Refund Request Denied</h1>
      <p style="color: #666666; font-size: 16px;">Hello {{name}},</p>
      <p style="color: #666666; font-size: 16px;">We regret to inform you that your refund request for order <strong>#{{order_id}}</strong> has been denied.</p>
      <p style="color: #666666; font-size: 16px;"><strong>Reason:</strong> {{manager_notes}}</p>
      <p style="color: #666666; font-size: 16px;">If you have any questions, please contact our support team.</p>
      <p style="color: #999999; font-size: 14px;">Thank you for shopping with us.</p>
    </td>
  </tr>
</table>
</body>
</html>
