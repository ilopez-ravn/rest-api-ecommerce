# Copy this file to application-local.properties and set real values for local development.
# application-local.properties is gitignored so secrets are not committed.
#
# Usage: run with -Dspring.profiles.active=local or set SPRING_PROFILES_ACTIVE=local

# Database (optional override; base defaults already point to localhost)
# spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce
# spring.datasource.username=postgres
# spring.datasource.password=admin

# App auth (required if not set via env)
app.jwt-secret=your-local-jwt-secret-min-32-chars-long
app.jwt-expiration-minutes=1440
app.refresh-token-expiration-days=7

# Stripe test keys (get from Stripe Dashboard)
stripe.api-key=sk_test_xxxx
stripe.webhook-secret=whsec_xxxx
stripe.currency=usd

# Mail (e.g. Gmail app password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password

# Cloudinary (get from Cloudinary Dashboard)
cloudinary.cloud-name=your-cloud-name
cloudinary.api-key=your-api-key
cloudinary.api-secret=your-api-secret
