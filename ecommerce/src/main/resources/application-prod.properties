# GCP / production profile. All secrets must be provided via environment variables
# (e.g. Cloud Run env vars or Secret Manager). No secret defaults here.
#
# Set SPRING_PROFILES_ACTIVE=prod (or gcp) when deploying.

# Cloud Run sets PORT=8080; ensure the app listens on it
server.port=${PORT:8080}

# Disable dev tools and verbose logging
spring.graphql.graphiql.enabled=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Database: in GCP use Cloud SQL connector URL and credentials from env.
# Explicit driver so Spring Boot does not fail with "Failed to determine a suitable driver class".
spring.datasource.driver-class-name=org.postgresql.Driver
# Example (set in Cloud Run):
#   DB_URL=jdbc:postgresql:///ecommerce?socketFactory=com.google.cloud.sql.postgres.SocketFactory&cloudSqlInstance=PROJECT:REGION:INSTANCE
#   DB_USERNAME=ecommerce_user
#   DB_PASSWORD=<from Secret Manager>

# App auth, Stripe, Mail, Cloudinary: set APP_JWT_SECRET, STRIPE_API_KEY, STRIPE_WEBHOOK_SECRET,
# SPRING_MAIL_*, CLOUDINARY_* via Cloud Run environment or Secret Manager.
