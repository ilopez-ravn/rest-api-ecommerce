# Test profile: safe defaults for local runs.
# In GitHub Actions, optional repo secrets can override via env vars (TEST_*).
# See .github/workflows/ci.yml and documentation for secret names.

spring.application.name=ecommerce

# Database (override in CI with TEST_DB_URL, TEST_DB_USERNAME, TEST_DB_PASSWORD)
spring.datasource.url=${TEST_DB_URL:jdbc:postgresql://localhost:5432/ecommerce}
spring.datasource.username=${TEST_DB_USERNAME:postgres}
spring.datasource.password=${TEST_DB_PASSWORD:admin}

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.graphql.graphiql.enabled=false

# App auth (override in CI with TEST_APP_JWT_SECRET, etc.)
app.jwt-secret=${TEST_APP_JWT_SECRET:test-jwt-secret-for-tests-only}
app.jwt-expiration-minutes=${TEST_APP_JWT_EXPIRATION_MINUTES:60}
app.refresh-token-expiration-days=${TEST_APP_REFRESH_TOKEN_EXPIRATION_DAYS:7}

# Stripe (override in CI with TEST_STRIPE_API_KEY, TEST_STRIPE_WEBHOOK_SECRET)
stripe.api-key=${TEST_STRIPE_API_KEY:test_stripe_key}
stripe.webhook-secret=${TEST_STRIPE_WEBHOOK_SECRET:test_webhook_secret}
stripe.currency=${TEST_STRIPE_CURRENCY:usd}

rate-limit.enabled=true
rate-limit.password-reset.capacity=3
rate-limit.password-reset.refill-duration-minutes=15
rate-limit.cache-max-size=10000
rate-limit.cache-ttl-minutes=60

# Mail (override in CI with TEST_SPRING_MAIL_*)
spring.mail.host=${TEST_SPRING_MAIL_HOST:localhost}
spring.mail.port=${TEST_SPRING_MAIL_PORT:1025}
spring.mail.username=${TEST_SPRING_MAIL_USERNAME:test@example.com}
spring.mail.password=${TEST_SPRING_MAIL_PASSWORD:test-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.trust=${TEST_SPRING_MAIL_HOST:localhost}
spring.mail.properties.mail.smtp.starttls.enable=true

# Cloudinary (override in CI with TEST_CLOUDINARY_*)
cloudinary.cloud-name=${TEST_CLOUDINARY_CLOUD_NAME:test-cloud}
cloudinary.api-key=${TEST_CLOUDINARY_API_KEY:test-key}
cloudinary.api-secret=${TEST_CLOUDINARY_API_SECRET:test-secret}
