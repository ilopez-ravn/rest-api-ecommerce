# Optional: add repo secrets (Settings → Secrets and variables → Actions) to inject
# test config in CI. application-test.properties uses TEST_* env vars with safe defaults.
# Secrets: TEST_APP_JWT_SECRET, TEST_DB_URL, TEST_DB_USERNAME, TEST_DB_PASSWORD,
# TEST_STRIPE_API_KEY, TEST_STRIPE_WEBHOOK_SECRET, TEST_SPRING_MAIL_HOST, TEST_SPRING_MAIL_USERNAME,
# TEST_SPRING_MAIL_PASSWORD, TEST_CLOUDINARY_CLOUD_NAME, TEST_CLOUDINARY_API_KEY, TEST_CLOUDINARY_API_SECRET
name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TEST_APP_JWT_SECRET: ${{ secrets.TEST_APP_JWT_SECRET }}
      TEST_APP_JWT_EXPIRATION_MINUTES: ${{ secrets.TEST_APP_JWT_EXPIRATION_MINUTES }}
      TEST_APP_REFRESH_TOKEN_EXPIRATION_DAYS: ${{ secrets.TEST_APP_REFRESH_TOKEN_EXPIRATION_DAYS }}
      TEST_DB_URL: ${{ secrets.TEST_DB_URL }}
      TEST_DB_USERNAME: ${{ secrets.TEST_DB_USERNAME }}
      TEST_DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
      TEST_STRIPE_API_KEY: ${{ secrets.TEST_STRIPE_API_KEY }}
      TEST_STRIPE_WEBHOOK_SECRET: ${{ secrets.TEST_STRIPE_WEBHOOK_SECRET }}
      TEST_STRIPE_CURRENCY: ${{ secrets.TEST_STRIPE_CURRENCY }}
      TEST_SPRING_MAIL_HOST: ${{ secrets.TEST_SPRING_MAIL_HOST }}
      TEST_SPRING_MAIL_PORT: ${{ secrets.TEST_SPRING_MAIL_PORT }}
      TEST_SPRING_MAIL_USERNAME: ${{ secrets.TEST_SPRING_MAIL_USERNAME }}
      TEST_SPRING_MAIL_PASSWORD: ${{ secrets.TEST_SPRING_MAIL_PASSWORD }}
      TEST_CLOUDINARY_CLOUD_NAME: ${{ secrets.TEST_CLOUDINARY_CLOUD_NAME }}
      TEST_CLOUDINARY_API_KEY: ${{ secrets.TEST_CLOUDINARY_API_KEY }}
      TEST_CLOUDINARY_API_SECRET: ${{ secrets.TEST_CLOUDINARY_API_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: ecommerce
        run: mvn clean test -B
