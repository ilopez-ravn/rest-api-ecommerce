# Test profile uses PostgreSQL (application-test.properties). All TEST_* repo secrets
# are passed as env so application-test.properties can use them.
name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TEST_DB_URL: ${{ secrets.TEST_DB_URL }}
      TEST_DB_USERNAME: ${{ secrets.TEST_DB_USERNAME }}
      TEST_DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
      TEST_APP_JWT_SECRET: ${{ secrets.TEST_APP_JWT_SECRET }}
      TEST_STRIPE_API_KEY: ${{ secrets.TEST_STRIPE_API_KEY }}
      TEST_STRIPE_WEBHOOK_SECRET: ${{ secrets.TEST_STRIPE_WEBHOOK_SECRET }}
      TEST_SPRING_MAIL_HOST: ${{ secrets.TEST_SPRING_MAIL_HOST }}
      TEST_SPRING_MAIL_PORT: ${{ secrets.TEST_SPRING_MAIL_PORT }}
      TEST_SPRING_MAIL_USERNAME: ${{ secrets.TEST_SPRING_MAIL_USERNAME }}
      TEST_SPRING_MAIL_PASSWORD: ${{ secrets.TEST_SPRING_MAIL_PASSWORD }}
      TEST_CLOUDINARY_CLOUD_NAME: ${{ secrets.TEST_CLOUDINARY_CLOUD_NAME }}
      TEST_CLOUDINARY_API_KEY: ${{ secrets.TEST_CLOUDINARY_API_KEY }}
      TEST_CLOUDINARY_API_SECRET: ${{ secrets.TEST_CLOUDINARY_API_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Check test DB config
        run: |
          if [ -n "$TEST_DB_URL" ]; then echo "TEST_DB_URL is set (full context test will run)"; else echo "TEST_DB_URL is not set (EcommerceApplicationTests will be skipped)"; fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: ecommerce
        run: mvn clean test -B
