# Test profile uses PostgreSQL (see application-test.properties). For CI you must provide
# a test DB: set repo secrets TEST_DB_URL, TEST_DB_USERNAME, TEST_DB_PASSWORD (e.g. hosted Postgres).
name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set test DB env from secrets (optional)
        run: |
          [ -n "${{ secrets.TEST_DB_URL }}" ] && echo "TEST_DB_URL=${{ secrets.TEST_DB_URL }}" >> $GITHUB_ENV
          [ -n "${{ secrets.TEST_DB_USERNAME }}" ] && echo "TEST_DB_USERNAME=${{ secrets.TEST_DB_USERNAME }}" >> $GITHUB_ENV
          [ -n "${{ secrets.TEST_DB_PASSWORD }}" ] && echo "TEST_DB_PASSWORD=${{ secrets.TEST_DB_PASSWORD }}" >> $GITHUB_ENV

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: ecommerce
        run: mvn clean test -B
