# Deploy to GCP Cloud Run on push to main.
# Requires GitHub secrets: GCP_PROJECT_ID, GCP_SA_KEY (service account JSON).
# Optional repo vars (Settings → Secrets and variables → Actions): DB_URL, DB_USERNAME,
# SPRING_MAIL_HOST, SPRING_MAIL_USERNAME, CLOUDINARY_CLOUD_NAME (non-secret env for the app).

name: Deploy to Cloud Run

on:
  push:
    branches: [main, improvements-phase-2]
  workflow_dispatch:
env:
  GCP_REGION: us-central1
  ARTIFACT_REGISTRY_REPO: docker-repo
  CLOUD_RUN_SERVICE: rest-api-ecommerce

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        working-directory: ecommerce
        run: mvn clean test -B

  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        id: build
        working-directory: ecommerce
        run: |
          REGISTRY="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}"
          IMAGE="${REGISTRY}/${{ env.CLOUD_RUN_SERVICE }}:${{ github.sha }}"
          docker build -t "$IMAGE" -t "${REGISTRY}/${{ env.CLOUD_RUN_SERVICE }}:latest" .
          docker push "$IMAGE"
          docker push "${REGISTRY}/${{ env.CLOUD_RUN_SERVICE }}:latest"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image "${{ steps.build.outputs.image }}" \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars "SPRING_PROFILES_ACTIVE=prod,APP_JWT_EXPIRATION_MINUTES=1440,APP_REFRESH_TOKEN_EXPIRATION_DAYS=7,STRIPE_CURRENCY=usd,RATE_LIMIT_ENABLED=true,SPRING_MAIL_PORT=587" \
            --set-secrets "DB_PASSWORD=DB_PASSWORD:latest,APP_JWT_SECRET=APP_JWT_SECRET:latest,STRIPE_API_KEY=STRIPE_API_KEY:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest,SPRING_MAIL_PASSWORD=SPRING_MAIL_PASSWORD:latest,CLOUDINARY_API_KEY=CLOUDINARY_API_KEY:latest,CLOUDINARY_API_SECRET=CLOUDINARY_API_SECRET:latest"
